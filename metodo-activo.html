<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área de Enfoque | FocusWave</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/modo-claro.css">
    <link rel="stylesheet" href="css/metodo-activo.css">
    <link rel="icon" href="img/icono.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="cuerpo-pagina" style="transition: background 1s ease;">

    <nav>
        <div class="flex items-center justify-between md:justify-center relative">

            <!-- Botón hamburguesa: solo se ve en pantallas chicas -->
            <button id="btn-menu" class="md:hidden text-2xl text-white bg-transparent border-none cursor-pointer">
                ☰
            </button>

            <!-- Lista de enlaces -->
            <ul id="menu-nav" class="hidden md:flex flex-col md:flex-row items-center gap-2 md:gap-5 list-none
                   absolute md:static top-full left-0 w-full md:w-auto
                   bg-slate-800 md:bg-transparent p-4 md:p-0">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="ambientes.html">Ambientes</a></li>
                <li><a href="cursos.html">Cursos</a></li>
                <li><a href="salas.html">Salas</a></li>
                <li><a href="metodos.html">Métodos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="iniciarSesion.html">Iniciar sesión</a></li>
                <li><a href="registrarse.html">Registrarse</a></li>
            </ul>
        </div>
    </nav>

    <main class="contenedor"
        style="justify-content: center; align-items: center; min-height: 70vh; display: flex; flex-direction: column;">

        <h1 id="titulo-metodo" style="font-size: 40px; margin-bottom: 10px; color: #38bdf8;">Cargando...</h1>
        <p id="instrucciones-metodo"
            style="color: #cbd5e1; max-width: 600px; text-align: center; margin-bottom: 30px; line-height: 1.6;"></p>

        <!-- INTERFAZ TEMPORIZADOR -->
        <div id="interfaz-reloj" class="panel"
            style="display: none; width: 100%; max-width: 500px; background: rgba(15,23,42,0.8); padding: 30px;">

            <h2 id="fase-actual" style="color: #38bdf8; font-size: 22px; margin-bottom: 20px; text-align: center;">Fase: Enfoque 🔥</h2>

            <div class="temporizador-contenedor">
                <div class="barra-progreso-circular">
                    <svg viewBox="0 0 220 220">
                        <circle class="barra-fondo" cx="110" cy="110" r="95" />
                        <circle id="circulo-progreso" class="barra-porcentaje" cx="110" cy="110" r="95" stroke-dashoffset="0" />
                    </svg>
                    <div id="tiempo-pantalla">25:00</div>
                </div>

                <div class="controles-temporizador">
                    <button id="btn-iniciar">▶ Iniciar</button>
                    <button id="btn-pausar">⏸ Pausar</button>
                    <button id="btn-reiniciar">↺ Reiniciar</button>
                </div>

                <p id="contador-ciclos">Ciclo #0 completados</p>
            </div>
        </div>

        <!-- INTERFAZ FLASHCARDS -->
        <div id="interfaz-flashcards" style="display: none; width: 100%; max-width: 600px; text-align: center;">

            <div style="margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <label style="color: #e2e8f0;">Estudiando ahora:</label>
                <select id="filtro-curso"
                    style="padding: 8px; border-radius: 5px; background: #1e293b; color: white; border: 1px solid #38bdf8;">
                    <option value="Todos">Todos los cursos</option>
                </select>
            </div>

            <div class="flashcard-info">
                <span id="contador-tarjetas">Tarjeta 0 de 0</span>
                <span id="pista-volteo" style="color: #94a3b8; font-size: 13px;">💡 Haz clic en la tarjeta</span>
            </div>

            <div class="flashcard-contenedor">
                <div id="flashcard-inner" class="flashcard-inner">
                    <div class="flashcard-front">
                        <h3 id="texto-tarjeta" style="font-size: 20px; margin: 0;">Cargando tarjeta...</h3>
                    </div>
                    <div class="flashcard-back">
                        <h3 id="respuesta-tarjeta" style="font-size: 20px; margin: 0;"></h3>
                    </div>
                </div>
            </div>

            <div class="flashcard-acciones">
                <button id="btn-anterior">◀ Anterior</button>
                <button id="btn-siguiente">Siguiente ▶</button>
                <button id="btn-editar">✏️ Editar</button>
                <button id="btn-eliminar-tarjeta">🗑️ Eliminar</button>
            </div>

            <div class="panel" style="text-align: left; background: rgba(15,23,42,0.6); margin-top: 30px;">
                <h3 style="margin-bottom: 15px; font-size: 18px;">Añadir nueva tarjeta</h3>
                <form id="form-flashcard" style="display: flex; flex-direction: column; gap: 10px;">
                    <select id="nuevo-curso" required
                        style="padding: 12px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white;">
                        <option value="" disabled selected>Selecciona el curso...</option>
                    </select>
                    <input type="text" id="nueva-pregunta" placeholder="Pregunta (Ej: ¿Regla de Leibniz?)" required
                        style="padding: 12px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white;">
                    <input type="text" id="nueva-respuesta" placeholder="Respuesta" required
                        style="padding: 12px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white;">
                    <button type="submit" style="padding: 12px; border-radius: 8px;">Guardar Tarjeta</button>
                </form>
            </div>

        </div>

    </main>

    <!-- Notificación visual oculta -->
    <div id="notificacion-fase" class="notificacion-cambio"></div>

    <script src="js/menu.js"></script>
    <script src="js/modo-claro.js"></script>
    <script src="js/metodo-activo.js"></script>
</body>

</html>
