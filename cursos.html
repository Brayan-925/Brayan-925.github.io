<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Cursos | FocusWave</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/modo-claro.css">
    <link rel="icon" href="img/icono.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <nav>
        <div class="flex items-center justify-between md:justify-center relative">

            <!-- Botón hamburguesa: solo se ve en pantallas chicas -->
            <button id="btn-menu" class="md:hidden text-2xl text-white bg-transparent border-none cursor-pointer">
                ☰
            </button>

            <!-- Lista de enlaces -->
            <ul id="menu-nav" class="hidden md:flex flex-col md:flex-row items-center gap-2 md:gap-5 list-none
                   absolute md:static top-full left-0 w-full md:w-auto
                   bg-slate-800 md:bg-transparent p-4 md:p-0">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="ambientes.html">Ambientes</a></li>
                <li><a href="cursos.html">Cursos</a></li>
                <li><a href="salas.html">Salas</a></li>
                <li><a href="metodos.html">Métodos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="iniciarSesion.html">Iniciar sesión</a></li>
                <li><a href="registrarse.html">Registrarse</a></li>
            </ul>
        </div>
    </nav>

    <main class="contenedor" style="padding: 40px 20px; max-width: 800px; margin: 0 auto;">

        <div class="panel"
            style="margin-bottom: 40px; background: rgba(15,23,42,0.8); padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
            <h1 style="color: #38bdf8; margin-top: 0; margin-bottom: 20px; font-size: 24px;">Añadir nueva materia</h1>

            <form id="form-curso" style="display: flex; gap: 15px; align-items: flex-start; flex-direction: column;">

                <div style="display: flex; gap: 15px; width: 100%; flex-wrap: wrap;">
                    <div style="flex: 2; min-width: 200px;">
                        <label style="color: #94a3b8; font-size: 14px; display: block; margin-bottom: 5px;">Nombre del
                            curso</label>
                        <input type="text" id="nombre-curso" placeholder="Ej: Cálculo Integral" required
                            style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white; box-sizing: border-box;">
                    </div>

                    <div style="flex: 1; min-width: 150px;">
                        <label style="color: #94a3b8; font-size: 14px; display: block; margin-bottom: 5px;">Día de la
                            semana</label>
                        <select id="dia-curso" required
                            style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white; box-sizing: border-box; height: 45px;">
                            <option value="" disabled selected>Selecciona un día...</option>
                            <option value="Lunes">Lunes</option>
                            <option value="Martes">Martes</option>
                            <option value="Miércoles">Miércoles</option>
                            <option value="Jueves">Jueves</option>
                            <option value="Viernes">Viernes</option>
                            <option value="Sábado">Sábado</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; width: 100%; flex-wrap: wrap;">
                    <div style="flex: 2; min-width: 200px;">
                        <label
                            style="color: #94a3b8; font-size: 14px; display: block; margin-bottom: 5px;">Profesor</label>
                        <input type="text" id="profesor-curso" placeholder="Ej: Mi profesor de teoría" required
                            style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white; box-sizing: border-box;">
                    </div>

                    <div style="flex: 1; min-width: 150px;">
                        <label style="color: #94a3b8; font-size: 14px; display: block; margin-bottom: 5px;">Hora de
                            Clase</label>
                        <input type="time" id="hora-curso" required
                            style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white; box-sizing: border-box; height: 45px;">
                    </div>
                </div>

                <button type="submit"
                    style="padding: 14px 25px; border-radius: 8px; width: 100%; background-color: #38bdf8; color: #0f172a; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.2s;">Guardar
                    Curso en el Sistema</button>
            </form>
        </div>

        <h2 style="color: #e2e8f0; margin-bottom: 15px; font-size: 24px;">Mis Cursos Registrados</h2>
        <div id="contenedor-cursos" class="grid"
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
        </div>

    </main>
    <script src="js/menu.js"></script>
    <script src="js/modo-claro.js"></script>
    <script src="js/cursos.js"></script>
</body>

</html>
