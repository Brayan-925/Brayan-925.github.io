<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Cursos | FocusWave</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/modo-claro.css">
    <link rel="icon" href="img/icono.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-40 px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between md:justify-center">
            <button id="btn-menu" class="md:hidden text-2xl text-slate-200 bg-transparent border-none cursor-pointer focus:outline-none p-1">☰</button>
            <ul class="hidden md:flex items-center gap-5 list-none m-0 p-0">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="ambientes.html">Ambientes</a></li>
                <li><a href="cursos.html">Cursos</a></li>
                <li><a href="salas.html">Salas</a></li>
                <li><a href="metodos.html">Métodos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="iniciarSesion.html">Iniciar sesión</a></li>
                <li><a href="registrarse.html">Registrarse</a></li>
                <li>
                    <select id="selector-idioma" style="background:#1e293b;color:#38bdf8;border:1px solid rgba(56,189,248,0.3);padding:8px 12px;border-radius:8px;font-weight:bold;cursor:pointer;outline:none;">
                        <option value="es">🇪🇸 Español</option>
                        <option value="en">🇺🇸 English</option>
                        <option value="ja">🇯🇵 日本語</option>
                    </select>
                </li>
            </ul>
        </div>
    </nav>

    <div id="menu-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 md:hidden"></div>

    <aside id="menu-drawer" class="fixed top-0 left-0 h-full w-72 bg-slate-900 border-r border-slate-800 z-[60] -translate-x-full transition-transform duration-300 ease-in-out md:hidden flex flex-col justify-between p-5 shadow-2xl">
        <div>
            <div class="flex items-center justify-between pb-3 mb-5 border-b border-slate-800">
                <span class="text-lg font-bold text-sky-400 tracking-wide">FocusWave</span>
                <button id="btn-cerrar-drawer" class="text-base font-semibold text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 w-8 h-8 rounded-full flex items-center justify-center border-none cursor-pointer transition-colors">✕</button>
            </div>
            <ul class="flex flex-col gap-2 list-none p-0 m-0">
                <li><a href="index.html" class="block py-2 px-3 text-slate-200 hover:bg-slate-800 hover:text-sky-400 font-medium rounded-lg transition-colors">Inicio</a></li>
                <li><a href="ambientes.html" class="block py-2 px-3 text-slate-200 hover:bg-slate-800 hover:text-sky-400 font-medium rounded-lg transition-colors">Ambientes</a></li>
                <li><a href="cursos.html" class="block py-2 px-3 text-slate-200 hover:bg-slate-800 hover:text-sky-400 font-medium rounded-lg transition-colors">Cursos</a></li>
                <li><a href="salas.html" class="block py-2 px-3 text-slate-200 hover:bg-slate-800 hover:text-sky-400 font-medium rounded-lg transition-colors">Salas</a></li>
                <li><a href="metodos.html" class="block py-2 px-3 text-slate-200 hover:bg-slate-800 hover:text-sky-400 font-medium rounded-lg transition-colors">Métodos</a></li>
                <li><a href="contacto.html" class="block py-2 px-3 text-slate-200 hover:bg-slate-800 hover:text-sky-400 font-medium rounded-lg transition-colors">Contacto</a></li>
                <li><a href="iniciarSesion.html" class="block py-2 px-3 text-slate-200 hover:bg-slate-800 hover:text-sky-400 font-medium rounded-lg transition-colors">Iniciar sesión</a></li>
                <li><a href="registrarse.html" class="block py-2 px-3 text-slate-200 hover:bg-slate-800 hover:text-sky-400 font-medium rounded-lg transition-colors">Registrarse</a></li>
            </ul>
        </div>
        <div class="pt-4 border-t border-slate-800">
            <label class="block text-xs text-slate-400 mb-2 font-medium">Idioma / Language</label>
            <select id="selector-idioma-movil" style="width:100%;background:#1e293b;color:#38bdf8;border:1px solid rgba(56,189,248,0.3);padding:10px;border-radius:8px;font-weight:bold;cursor:pointer;outline:none;">
                <option value="es">🇪🇸 Español</option>
                <option value="en">🇺🇸 English</option>
                <option value="ja">🇯🇵 日本語</option>
            </select>
        </div>
    </aside>

    <main class="contenedor" style="padding: 40px 20px; max-width: 800px; margin: 0 auto;">
        <div class="panel" style="margin-bottom: 40px; background: rgba(15,23,42,0.8); padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
            <h1 style="color: #38bdf8; margin-top: 0; margin-bottom: 20px; font-size: 24px;">Añadir nueva materia</h1>
            <form id="form-curso" style="display: flex; gap: 15px; align-items: flex-start; flex-direction: column;">
                <div style="display: flex; gap: 15px; width: 100%; flex-wrap: wrap;">
                    <div style="flex: 2; min-width: 200px;">
                        <label style="color: #94a3b8; font-size: 14px; display: block; margin-bottom: 5px;">Nombre del curso</label>
                        <input type="text" id="nombre-curso" placeholder="Ej: Cálculo Integral" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white; box-sizing: border-box;">
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <label style="color: #94a3b8; font-size: 14px; display: block; margin-bottom: 5px;">Día de la semana</label>
                        <select id="dia-curso" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white; box-sizing: border-box; height: 45px;">
                            <option value="" disabled selected>Selecciona un día...</option>
                            <option value="Lunes">Lunes</option>
                            <option value="Martes">Martes</option>
                            <option value="Miércoles">Miércoles</option>
                            <option value="Jueves">Jueves</option>
                            <option value="Viernes">Viernes</option>
                            <option value="Sábado">Sábado</option>
                        </select>
                    </div>
                <div style="display: flex; gap: 15px; width: 100%; flex-wrap: wrap;">
                    <div style="flex: 2; min-width: 200px;">
                        <label style="color: #94a3b8; font-size: 14px; display: block; margin-bottom: 5px;">Profesor</label>
                        <input type="text" id="profesor-curso" placeholder="Ej: Mi profesor de teoría" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white; box-sizing: border-box;">
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <label style="color: #94a3b8; font-size: 14px; display: block; margin-bottom: 5px;">Hora de Clase</label>
                        <input type="time" id="hora-curso" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white; box-sizing: border-box; height: 45px;">
                    </div>
                <button type="submit" style="padding: 14px 25px; border-radius: 8px; width: 100%; background-color: #38bdf8; color: #0f172a; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.2s;">Guardar Curso en el Sistema</button>
            </form>
        </div>
        <h2 style="color: #e2e8f0; margin-bottom: 15px; font-size: 24px;">Mis Cursos Registrados</h2>
        <div id="contenedor-cursos" class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;"></div>
    </main>

    <script src="js/menu.js"></script>
    <script src="js/modo-claro.js"></script>
    <script src="js/cursos.js"></script>
</body>
</html>
